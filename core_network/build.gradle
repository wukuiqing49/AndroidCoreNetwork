plugins {
    alias(libs.plugins.android.library)
    alias(libs.plugins.kotlin.android)
    id 'maven-publish'
}

android {
    namespace = 'com.wkq.net'
    compileSdk appConfig.compileSdk

    defaultConfig {
        minSdk appConfig.minSdk

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled = false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    buildFeatures {
        viewBinding = true
    }
    publishing {
        singleVariant("release") {
            withSourcesJar()
        }
    }
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

dependencies {

//    // Coroutines
    api libs.kotlinx.coroutines.core
    api libs.kotlinx.coroutines.android

    api libs.retrofit
    api libs.retrofit.converter.gson
    api libs.okhttp
    api libs.okhttp.logging
    api libs.gson
    
    testImplementation libs.junit

}

def publishedGroupId = providers.gradleProperty("POM_GROUP_ID")
        .orElse(providers.environmentVariable("POM_GROUP_ID"))
        .orElse("com.github.wukuiqing49.AndroidCoreNetwork")
def publishedArtifactId = providers.gradleProperty("POM_ARTIFACT_ID")
        .orElse(providers.environmentVariable("POM_ARTIFACT_ID"))
        .orElse("core_network")
def publishedVersion = providers.gradleProperty("POM_VERSION")
        .orElse(providers.environmentVariable("POM_VERSION"))
        .orElse("0.0.1-SNAPSHOT")
def githubRepository = providers.gradleProperty("GITHUB_REPOSITORY")
        .orElse(providers.environmentVariable("GITHUB_REPOSITORY"))
        .orElse("wukuiqing49/AndroidCoreNetwork")

publishing {
    publications {
        release(MavenPublication) {
            groupId = publishedGroupId.get()
            artifactId = publishedArtifactId.get()
            version = publishedVersion.get()

            afterEvaluate {
                from components.release
            }

            pom {
                name = "core_network"
                description = "Android network library based on Retrofit and OkHttp, with unified response handling, upload, download, dynamic base url and consumer ProGuard rules."
                url = "https://github.com/${githubRepository.get()}"
                licenses {
                    license {
                        name = "The Apache License, Version 2.0"
                        url = "https://www.apache.org/licenses/LICENSE-2.0.txt"
                    }
                }
                developers {
                    developer {
                        id = "wukuiqing49"
                        name = "wukuiqing49"
                    }
                }
                scm {
                    connection = "scm:git:https://github.com/${githubRepository.get()}.git"
                    developerConnection = "scm:git:ssh://git@github.com/${githubRepository.get()}.git"
                    url = "https://github.com/${githubRepository.get()}"
                }
            }
        }
    }
    repositories {
        maven {
            name = "GitHubPackages"
            url = uri("https://maven.pkg.github.com/${githubRepository.get()}")
            credentials {
                username = providers.gradleProperty("gpr.user")
                        .orElse(providers.environmentVariable("GITHUB_ACTOR"))
                        .orElse("")
                        .get()
                password = providers.gradleProperty("gpr.key")
                        .orElse(providers.environmentVariable("GITHUB_TOKEN"))
                        .orElse("")
                        .get()
            }
        }
    }
}
